<svg width="340" height="50" viewBox="0 0 340 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Degradado espectral de frecuencias -->
    <linearGradient id="reverbic-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="50%" stop-color="#7000FF" />
      <stop offset="100%" stop-color="#FF0055" />
    </linearGradient>
    
    <!-- Filtro de brillo sutil estilo monitor CRT/Terminal -->
    <filter id="neon-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#neon-glow)">
    <!-- ================= ICONO: CLI PROMPT + AUDIO NODE ================= -->
    <!-- El prompt '>' de la TUI -->
    <path d="M10 13L22 25L10 37V31L19 25L10 19V13Z" fill="url(#reverbic-gradient)" />
    <!-- Barras del ecualizador que emergen del prompt -->
    <rect x="27" y="20" width="4" height="10" rx="1" fill="#00F0FF" />
    <rect x="34" y="14" width="4" height="22" rx="1" fill="#7000FF" />
    <rect x="41" y="23" width="4" height="4" rx="1" fill="#FF0055" />

    <!-- ================= TIPOGRAFÍA ORIGINAL: REVERBIC ================= -->
    <!-- Cada letra mide 22px de ancho y está construida con bloques y cortes a 45° -->
    <g fill="url(#reverbic-gradient)">
      
      <!-- R (X: 55) -->
      <path d="M55 12H73C77 12 77 15 77 17V23C77 25 75 26 73 26H61V38H55V12ZM61 17V21H71V17H61ZM68 26L76 38H70L63 26H68Z" />
      
      <!-- E (X: 83) -->
