<svg width="265" height="50" viewBox="0 0 265 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="reverbic-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="50%" stop-color="#7000FF" />
      <stop offset="100%" stop-color="#FF0055" />
    </linearGradient>
    <filter id="neon-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    #bar1 { transform-origin: 29px 30px; animation: eq1 1.8s ease-in-out infinite; }
    #bar2 { transform-origin: 36px 36px; animation: eq2 2.1s ease-in-out 0.4s infinite; }
    #bar3 { transform-origin: 43px 27px; animation: eq3 1.5s ease-in-out 0.8s infinite; }
    @keyframes eq1 {
      0%, 100% { transform: scaleY(0.4); }
      25%      { transform: scaleY(1.6); }
      55%      { transform: scaleY(0.7); }
      80%      { transform: scaleY(1.9); }
    }
    @keyframes eq2 {
      0%, 100% { transform: scaleY(0.36); }
      20%      { transform: scaleY(1.18); }
      55%      { transform: scaleY(0.5);  }
      80%      { transform: scaleY(1.0);  }
    }
    @keyframes eq3 {
      0%, 100% { transform: scaleY(0.5); }
      30%      { transform: scaleY(3.5); }
      55%      { transform: scaleY(1.0); }
      75%      { transform: scaleY(4.0); }
    }
  </style>

  <g filter="url(#neon-glow)">
    <path d="M10 13L22 25L10 37V31L19 25L10 19V13Z" fill="url(#reverbic-gradient)" />
    <rect id="bar1" x="27" y="20" width="4" height="10" rx="1" fill="#00F0FF" />
