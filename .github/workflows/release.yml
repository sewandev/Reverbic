name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build Windows release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Rename binary
        run: |
          $version = "${{ github.ref_name }}"
          $src = "target\x86_64-pc-windows-msvc\release\reverbic.exe"
          $dst = "reverbic-$version-x86_64-windows.exe"
          Copy-Item $src $dst

      - name: Compute SHA256
        id: sha256
        run: |
          $version = "${{ github.ref_name }}"
          $file = "reverbic-$version-x86_64-windows.exe"
          $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
          echo "hash=$hash" >> $env:GITHUB_OUTPUT
          echo "SHA256: $hash"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Reverbic ${{ github.ref_name }}
          body: |
            ## Reverbic ${{ github.ref_name }}

            ### Quick install

            **Scoop**
            ```powershell
            scoop bucket add reverbic https://github.com/sewandev/scoop-reverbic
            scoop install reverbic
            ```

            **Direct download**
            Download `reverbic-${{ github.ref_name }}-x86_64-windows.exe`, place it in a folder on your PATH, and run it from a terminal.

            **SHA256:** `${{ steps.sha256.outputs.hash }}`

            ---
            See the [README](https://github.com/sewandev/Reverbic#readme) for Spotify setup instructions.
          files: reverbic-${{ github.ref_name }}-x86_64-windows.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  build-macos:
    name: Build macOS release (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ matrix.target }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary and compute SHA256
        id: prepare
        run: |
          VERSION="${{ github.ref_name }}"
          SRC="target/${{ matrix.target }}/release/reverbic"
          DST="reverbic-${VERSION}-${{ matrix.target }}"
          cp "$SRC" "$DST"
          
          HASH=$(shasum -a 256 "$DST" | awk '{print $1}')
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "SHA256: $HASH"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: reverbic-${{ github.ref_name }}-${{ matrix.target }}
