name: Question or support
description: Something is unclear or you need help setting up Reverbic
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        For quick answers, check the [README](https://github.com/sewandev/Reverbic#readme) first.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: Describe in detail what you need to know or what is not working.
    validations:
      required: true

  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Spotify setup
        - Installation
        - General usage
        - Building from source
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I read the README and did not find an answer.
          required: true
