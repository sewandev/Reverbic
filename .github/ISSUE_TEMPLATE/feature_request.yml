name: Feature request
description: Propose a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening this issue, please check if a similar request already exists.

  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What problem would this feature solve? What is the use case?
      placeholder: "Example: When listening to radio for hours, there is no way to see the song history from previous days..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you picture this working?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Is there another way to solve this? Why did you rule it out?

  - type: dropdown
    id: area
    attributes:
      label: App area
      options:
        - Radio
        - Spotify
        - Overlay / system tray
        - UI / Navigation
        - Audio (ducking, crossfade, volume)
        - Installation / configuration
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
