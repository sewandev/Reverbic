name: Solicitud de funcionalidad
description: Proponer una nueva funcion o mejora
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Antes de abrir este issue, revisa si ya existe una solicitud similar.

  - type: textarea
    id: problem
    attributes:
      label: Problema o necesidad
      description: Que problema resolveria esta funcionalidad? Cual es el caso de uso?
      placeholder: "Ejemplo: Cuando escucho radio por horas, no hay forma de ver el historial de canciones de dias anteriores..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Solucion propuesta
      description: Como te imaginas que deberia funcionar?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas consideradas
      description: Hay alguna otra forma de resolver esto? Por que la descartas?

  - type: dropdown
    id: area
    attributes:
      label: Area de la aplicacion
      options:
        - Radio
        - Spotify
        - Overlay / bandeja del sistema
        - UI / Navegacion
        - Audio (ducking, crossfade, volumen)
        - Instalacion / configuracion
        - Otro
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Lista de verificacion
      options:
        - label: Busque en los issues existentes y esta solicitud no es un duplicado.
          required: true
