name: Bug report
description: Something is not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report. Please complete all fields so we can reproduce the issue.

  - type: dropdown
    id: version
    attributes:
      label: Reverbic version
      description: You can find this in the help screen (Alt+H) or in the executable filename.
      options:
        - v1.3.1
        - v1.3.0
        - v1.2.0
        - v1.1.0
        - v1.0.0
        - Built from source
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows version
      description: "Example: Windows 11 23H2 / Windows 10 22H2"
      placeholder: Windows 10 / 11 + build
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal used
      description: "Example: Windows Terminal, PowerShell 7, CMD"
      placeholder: Windows Terminal v1.x
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Describe exactly what you did before the issue occurred.
      placeholder: |
        1. Open Reverbic
        2. Go to the Spotify tab
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: Paste the contents of `logs/reverbic.log` if relevant.
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I am using the latest available version.
          required: true
